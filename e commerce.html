<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Shop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    nav {
      background: #222;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }
    nav .logo { font-size: 22px; font-weight: bold; }
    nav ul { list-style: none; display: flex; gap: 20px; }
    nav ul a { color: white; text-decoration: none; font-size: 14px; }
    nav ul a:hover { color: #f90; }
    .cart-btn {
      background: #f90; color: white; border: none;
      padding: 8px 18px; border-radius: 5px; cursor: pointer; font-size: 14px;
    }

    .hero {
      background: linear-gradient(135deg, #222, #444);
      color: white; text-align: center; padding: 70px 20px;
    }
    .hero h1 { font-size: 40px; margin-bottom: 12px; }
    .hero p  { font-size: 16px; color: #ccc; margin-bottom: 24px; }
    .hero a {
      background: #f90; color: white; padding: 12px 30px;
      border-radius: 5px; text-decoration: none; font-size: 15px;
    }

    .section-title { text-align: center; font-size: 26px; margin: 40px 0 20px; }

    .products {
      display: flex; flex-wrap: wrap; gap: 20px;
      justify-content: center; padding: 0 30px 40px;
    }

    .card {
      background: white; border-radius: 8px; width: 220px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden; transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; height: 160px; object-fit: cover; }
    .card-body { padding: 14px; }
    .card-body h3 { font-size: 16px; margin-bottom: 6px; }
    .card-body .price {
      color: #f90; font-size: 18px; font-weight: bold; margin-bottom: 10px;
    }
    .card-body button {
      width: 100%; background: #222; color: white; border: none;
      padding: 9px; border-radius: 5px; cursor: pointer; font-size: 13px;
    }
    .card-body button:hover { background: #f90; }

    footer {
      background: #222; color: #aaa;
      text-align: center; padding: 20px; font-size: 13px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">🛒 MyShop</div>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <button class="cart-btn">Cart (0)</button>
  </nav>

  <div class="hero">
    <h1>Welcome to MyShop</h1>
    <p>Find the best products at the best prices.</p>
    <a href="#">Shop Now</a>
  </div>

  <h2 class="section-title">Our Products</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=300&fit=crop" alt="Headphones"/>
      <div class="card-body">
        <h3>Headphones</h3>
        <p class="price">₹1,299</p>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=300&fit=crop" alt="Sneakers"/>
      <div class="card-body">
        <h3>Sneakers</h3>
        <p class="price">₹2,499</p>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop" alt="Watch"/>
      <div class="card-body">
        <h3>Smart Watch</h3>
        <p class="price">₹3,999</p>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=300&fit=crop" alt="Bag"/>
      <div class="card-body">
        <h3>Backpack</h3>
        <p class="price">₹899</p>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400&h=300&fit=crop" alt="Perfume"/>
      <div class="card-body">
        <h3>Perfume</h3>
        <p class="price">₹1,599</p>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=400&h=300&fit=crop" alt="Running Shoes"/>
      <div class="card-body">
        <h3>Running Shoes</h3>
        <p class="price">₹3,199</p>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&h=300&fit=crop" alt="Camera"/>
      <div class="card-body">
        <h3>Camera</h3>
        <p class="price">₹24,999</p>
        <button>Add to Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=300&fit=crop" alt="Sunglasses"/>
      <div class="card-body">
        <h3>Sunglasses</h3>
        <p class="price">₹799</p>
        <button>Add to Cart</button>
      </div>
    </div>

  </div>



</body>
</html>
